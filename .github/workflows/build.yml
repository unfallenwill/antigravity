name: package

# Produce .deb + .rpm for the Antigravity family (x86-64 and arm64) from the
# upstream Linux tarballs and publish them to a GitHub Release tagged
# <product>-v<version>.
#
# Two products share this workflow:
#   - antigravity      (hub channel; build-id auto-resolved from the listable GCS bucket)
#   - antigravity-ide  (stable channel; requires explicit upstream URLs)
#
# Triggers:
#   - workflow_dispatch: package an explicit product + version.
#   - schedule: auto-discover the latest antigravity hub version and build it
#     if no antigravity-v<version> release exists yet. (antigravity-ide is
#     manual-only: the stable CDN is not listable.)
on:
  workflow_dispatch:
    inputs:
      product:
        description: "Product"
        required: true
        type: choice
        default: antigravity
        options: [antigravity, antigravity-ide]
      version:
        description: "Version, e.g. 2.1.4"
        required: true
        type: string
      channel:
        description: "Channel (antigravity-ide must use stable/custom + URLs)"
        required: true
        type: choice
        default: hub
        options: [hub, stable, custom]
      url_x64:
        description: "Explicit x64 tarball URL (stable/custom; empty = hub auto-resolve)"
        required: false
        type: string
      url_arm:
        description: "Explicit arm tarball URL (stable/custom; empty = hub auto-resolve)"
        required: false
        type: string
  schedule:
    # every 6 hours, off the round minute
    - cron: "23 */6 * * *"

permissions:
  contents: write

jobs:
  discover:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.find.outputs.version }}
      build: ${{ steps.find.outputs.build }}
    steps:
      - name: Find latest antigravity hub version not yet released
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsSL "https://storage.googleapis.com/antigravity-public/?prefix=antigravity-hub/&delimiter=/" -o listing.xml
          latest="$(grep -oE 'antigravity-hub/[0-9]+\.[0-9]+\.[0-9]+-[0-9]+/' listing.xml \
            | sed -E 's#antigravity-hub/([0-9]+\.[0-9]+\.[0-9]+)-[0-9]+/#\1#' \
            | grep -v '^100\.' | sort -uV | tail -1)"
          echo "Latest antigravity hub version: $latest"
          if [ -z "$latest" ]; then echo "build=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if gh release view "antigravity-v${latest}" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Already released; nothing to do."
            echo "build=false" >> "$GITHUB_OUTPUT"
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "version=${latest}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: discover
    if: |
      always() &&
      ((github.event_name == 'workflow_dispatch') || (needs.discover.outputs.build == 'true'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm]
    steps:
      - uses: actions/checkout@v4

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Resolve parameters
        id: p
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "product=antigravity"             >> "$GITHUB_OUTPUT"
            echo "version=${{ needs.discover.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "channel=hub"                     >> "$GITHUB_OUTPUT"
          else
            echo "product=${{ inputs.product }}"   >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}"   >> "$GITHUB_OUTPUT"
            echo "channel=${{ inputs.channel }}"   >> "$GITHUB_OUTPUT"
          fi

      - name: Build packages
        env:
          PRODUCT: ${{ steps.p.outputs.product }}
          VERSION: ${{ steps.p.outputs.version }}
          ARCH: ${{ matrix.arch }}
          CHANNEL: ${{ steps.p.outputs.channel }}
          URL_X64: ${{ inputs.url_x64 }}
          URL_ARM: ${{ inputs.url_arm }}
        run: ./packaging/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ steps.p.outputs.product }}-${{ matrix.arch }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve version + product
        id: v
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "product=antigravity"             >> "$GITHUB_OUTPUT"
            echo "version=${{ needs.discover.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "product=${{ inputs.product }}"   >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}"   >> "$GITHUB_OUTPUT"
          fi

      - name: Stage assets and checksums
        env:
          PRODUCT: ${{ steps.v.outputs.product }}
          VER: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p assets
          cp dist/*.deb dist/*.rpm assets/
          ( cd assets && sha256sum *.deb *.rpm > "checksums_${PRODUCT}_${VER}.txt" )
          echo "Assets:"; ls -lh assets/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRODUCT: ${{ steps.v.outputs.product }}
          VER: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          TAG="${PRODUCT}-v${VER}"
          DISPLAY="Antigravity"; [ "$PRODUCT" = "antigravity-ide" ] && DISPLAY="Antigravity IDE"

          {
            echo "${DISPLAY} ${VER} — unofficial Linux packages"
            echo
            echo "Repackaged from Google's official Linux tarball. This software is (c) Google LLC."
            echo "See the repo README/NOTICE for install instructions and disclaimers."
            echo
            echo "## Assets"
            for f in assets/*.deb assets/*.rpm assets/checksums_*.txt; do
              echo "- \`$(basename "$f")\`"
            done
          } > /tmp/notes.md

          if gh release view "$TAG" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG exists; uploading/clobbering assets."
            gh release upload "$TAG" assets/* -R "${{ github.repository }}" --clobber
          else
            gh release create "$TAG" assets/* \
              -R "${{ github.repository }}" \
              --title "${DISPLAY} ${VER} (unofficial)" \
              --notes-file /tmp/notes.md
          fi
